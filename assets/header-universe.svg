<svg width="1600" height="560" viewBox="0 0 1600 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="1600" height="560">
    <div xmlns="http://www.w3.org/1999/xhtml" class="frame">
      <style>
        :root {
          --bg-0: #020611;
          --bg-1: #071327;
          --bg-2: #0b1d42;
          --bg-3: #1b1132;
          --teal-0: #9ffdf4;
          --teal-1: #49e7da;
          --teal-2: #1ca3da;
          --orange-0: #ffd6ad;
          --orange-1: #f59c63;
          --text-0: #f4fbff;
          --text-1: #d6e7f6;
          --text-2: #9fb6c8;
          --map: url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20900%20420%22%3E%3Cg%20fill%3D%22%23dffff8%22%20fill-opacity%3D%22.78%22%3E%3Cpath%20d%3D%22M66%20142c28-34%2076-55%20126-48%2044%206%2078%2028%2090%2054%2018%204%2034%2016%2038%2033%209%2036-26%2078-80%2096-74%2025-162-2-201-61-21-31-16-51%2027-74z%22%2F%3E%3Cpath%20d%3D%22M262%20108c24-18%2064-24%2092-14%2036%2014%2057%2050%2039%2082-16%2028-62%2042-95%2029-34-12-57-56-36-97z%22%2F%3E%3Cpath%20d%3D%22M438%20118c42-28%20104-32%20146-12%2039%2018%2064%2058%2055%2091-8%2031-42%2054-88%2060-59%208-129-10-159-42-28-30-16-72%2046-97z%22%2F%3E%3Cpath%20d%3D%22M626%20170c30-16%2074-18%20102-6%2034%2016%2050%2045%2042%2071-9%2028-39%2051-84%2060-52%2011-104%200-123-26-26-34%207-79%2063-99z%22%2F%3E%3Cpath%20d%3D%22M756%20130c28-12%2064-8%2084%2011%2022%2022%2018%2053-9%2076-29%2024-74%2029-102%2012-30-18-29-54%2027-99z%22%2F%3E%3C%2Fg%3E%3Cg%20fill%3D%22%23aff7ef%22%20fill-opacity%3D%22.52%22%3E%3Cpath%20d%3D%22M180%20226c34-18%2082-18%20116%201%2023%2012%2025%2030%204%2047-31%2026-92%2035-137%2019-37-14-31-44%2017-67z%22%2F%3E%3Cpath%20d%3D%22M540%20246c36-18%2088-16%20121%205%2022%2015%2020%2034-6%2051-36%2024-104%2028-143%208-34-18-19-47%2028-64z%22%2F%3E%3C%2Fg%3E%3C%2Fsvg%3E");
          --clouds: url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20900%20420%22%3E%3Cg%20fill%3D%22%23ffffff%22%20fill-opacity%3D%22.62%22%3E%3Cellipse%20cx%3D%22150%22%20cy%3D%22112%22%20rx%3D%22108%22%20ry%3D%2230%22%2F%3E%3Cellipse%20cx%3D%22252%22%20cy%3D%22166%22%20rx%3D%2286%22%20ry%3D%2224%22%2F%3E%3Cellipse%20cx%3D%22372%22%20cy%3D%2294%22%20rx%3D%2292%22%20ry%3D%2226%22%2F%3E%3Cellipse%20cx%3D%22520%22%20cy%3D%22150%22%20rx%3D%22112%22%20ry%3D%2228%22%2F%3E%3Cellipse%20cx%3D%22678%22%20cy%3D%22110%22%20rx%3D%2294%22%20ry%3D%2224%22%2F%3E%3Cellipse%20cx%3D%22786%22%20cy%3D%22176%22%20rx%3D%2282%22%20ry%3D%2220%22%2F%3E%3Cellipse%20cx%3D%22504%22%20cy%3D%22258%22%20rx%3D%22126%22%20ry%3D%2234%22%2F%3E%3Cellipse%20cx%3D%22250%22%20cy%3D%22278%22%20rx%3D%22112%22%20ry%3D%2228%22%2F%3E%3C%2Fg%3E%3C%2Fsvg%3E");
        }

        * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
        }

        .frame {
          width: 1600px;
          height: 560px;
          padding: 22px 26px 24px;
          background: transparent;
          font-family: "Avenir Next", "Segoe UI", Arial, sans-serif;
        }

        .scene {
          position: relative;
          width: 100%;
          height: 100%;
          overflow: hidden;
          border-radius: 38px;
          background:
            radial-gradient(circle at 24% 28%, rgba(69, 232, 221, 0.12), transparent 28%),
            radial-gradient(circle at 80% 22%, rgba(245, 156, 99, 0.14), transparent 26%),
            radial-gradient(circle at 54% 88%, rgba(64, 97, 212, 0.14), transparent 30%),
            linear-gradient(115deg, var(--bg-0) 0%, var(--bg-1) 32%, var(--bg-2) 64%, var(--bg-3) 100%);
          color: var(--text-0);
          isolation: isolate;
        }

        .scene::before {
          content: "";
          position: absolute;
          inset: 0;
          border-radius: 38px;
          border: 1px solid rgba(255, 255, 255, 0.08);
          pointer-events: none;
        }

        .space,
        .stars,
        .dust,
        .trail,
        .planet-scene,
        .hero {
          position: absolute;
        }

        .space {
          inset: 0;
          background:
            radial-gradient(circle at 18% 24%, rgba(44, 235, 224, 0.2), transparent 24%),
            radial-gradient(circle at 70% 80%, rgba(92, 96, 255, 0.12), transparent 24%),
            radial-gradient(circle at 88% 18%, rgba(255, 174, 123, 0.12), transparent 18%);
          filter: blur(0.2px);
        }

        .stars {
          inset: -5%;
          animation-timing-function: linear;
          animation-iteration-count: infinite;
          background-repeat: no-repeat;
        }

        .stars.one {
          opacity: 0.92;
          animation-name: starsDriftOne;
          animation-duration: 28s;
          background-image:
            radial-gradient(circle at 8% 16%, rgba(255,255,255,.98) 0 1.8px, transparent 2.2px),
            radial-gradient(circle at 16% 8%, rgba(155,255,245,.9) 0 2.2px, transparent 2.7px),
            radial-gradient(circle at 28% 14%, rgba(255,255,255,.92) 0 1.6px, transparent 2px),
            radial-gradient(circle at 41% 10%, rgba(255,255,255,.82) 0 1.8px, transparent 2.3px),
            radial-gradient(circle at 58% 13%, rgba(255,255,255,.92) 0 1.8px, transparent 2.2px),
            radial-gradient(circle at 71% 18%, rgba(145,251,244,.96) 0 2.4px, transparent 3px),
            radial-gradient(circle at 83% 11%, rgba(147,235,255,.9) 0 2px, transparent 2.4px),
            radial-gradient(circle at 92% 14%, rgba(255,211,170,.95) 0 1.8px, transparent 2.2px),
            radial-gradient(circle at 78% 28%, rgba(255,255,255,.84) 0 1.3px, transparent 1.8px),
            radial-gradient(circle at 88% 23%, rgba(255,255,255,.86) 0 1.2px, transparent 1.8px),
            radial-gradient(circle at 12% 22%, rgba(255,255,255,.8) 0 1.4px, transparent 1.8px),
            radial-gradient(circle at 35% 24%, rgba(255,255,255,.42) 0 1.6px, transparent 2px);
        }

        .stars.two {
          opacity: 0.5;
          transform: scale(1.05);
          animation-name: starsDriftTwo;
          animation-duration: 42s;
          background-image:
            radial-gradient(circle at 9% 34%, rgba(255,255,255,.62) 0 1.2px, transparent 1.7px),
            radial-gradient(circle at 22% 27%, rgba(255,255,255,.54) 0 1.1px, transparent 1.6px),
            radial-gradient(circle at 38% 30%, rgba(255,255,255,.45) 0 1.2px, transparent 1.7px),
            radial-gradient(circle at 53% 21%, rgba(255,255,255,.48) 0 1.1px, transparent 1.6px),
            radial-gradient(circle at 67% 31%, rgba(255,255,255,.42) 0 1.1px, transparent 1.6px),
            radial-gradient(circle at 86% 28%, rgba(255,255,255,.44) 0 1.1px, transparent 1.6px),
            radial-gradient(circle at 94% 22%, rgba(255,255,255,.35) 0 1.1px, transparent 1.6px),
            radial-gradient(circle at 30% 20%, rgba(255,190,147,.6) 0 1.1px, transparent 1.6px);
        }

        .dust {
          inset: -10%;
          filter: blur(70px);
          opacity: 0.54;
          animation: dustPulse 14s ease-in-out infinite;
        }

        .dust.one {
          background:
            radial-gradient(circle at 28% 30%, rgba(43, 214, 206, 0.28), transparent 18%),
            radial-gradient(circle at 76% 24%, rgba(255, 163, 98, 0.24), transparent 18%);
        }

        .dust.two {
          background:
            radial-gradient(circle at 56% 82%, rgba(66, 98, 226, 0.18), transparent 18%),
            radial-gradient(circle at 86% 56%, rgba(245, 124, 55, 0.08), transparent 14%);
          animation-delay: -5s;
        }

        .trail {
          left: -10%;
          width: 120%;
          border-top-style: solid;
          border-radius: 50%;
          animation: orbitSweep 18s ease-in-out infinite;
          opacity: 0.7;
        }

        .trail.one {
          bottom: 58px;
          height: 210px;
          border-top-width: 2px;
          border-top-color: rgba(109, 245, 229, 0.18);
          transform: rotate(1deg);
        }

        .trail.two {
          bottom: 74px;
          height: 176px;
          border-top-width: 2px;
          border-top-color: rgba(255, 255, 255, 0.08);
          transform: rotate(-4deg);
          animation-delay: -5s;
        }

        .trail.three {
          bottom: 36px;
          height: 248px;
          border-top-width: 2px;
          border-top-color: rgba(100, 136, 255, 0.12);
          transform: rotate(-8deg);
          animation-delay: -9s;
        }

        .hero {
          left: 108px;
          top: 92px;
          width: 690px;
          z-index: 5;
        }

        .hero::before {
          content: "";
          position: absolute;
          inset: -52px -78px -56px -52px;
          border-radius: 64px;
          background:
            radial-gradient(circle at 26% 24%, rgba(61, 239, 226, 0.16), transparent 24%),
            linear-gradient(90deg, rgba(7, 17, 37, 0.74), rgba(7, 17, 37, 0.08));
          filter: blur(12px);
          z-index: -1;
        }

        .eyebrow {
          display: inline-flex;
          align-items: center;
          gap: 14px;
          padding: 13px 22px;
          border: 1px solid rgba(130, 247, 238, 0.2);
          border-radius: 999px;
          background: rgba(10, 20, 43, 0.72);
          box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset;
          color: rgba(227, 244, 255, 0.88);
          font-size: 14px;
          font-weight: 700;
          letter-spacing: 3px;
          text-transform: uppercase;
        }

        .dots {
          display: inline-flex;
          gap: 10px;
          align-items: center;
        }

        .dots span {
          width: 12px;
          height: 12px;
          border-radius: 50%;
          display: block;
        }

        .dots .a { background: #7ef7ee; }
        .dots .b { background: #97e9ff; }
        .dots .c { background: #ffb17b; }

        h1 {
          margin-top: 28px;
          font-size: 92px;
          line-height: 0.92;
          letter-spacing: 2px;
          font-weight: 800;
          color: var(--text-0);
          text-transform: uppercase;
          text-shadow: 0 0 28px rgba(121, 250, 240, 0.08);
        }

        .subtitle {
          margin-top: 26px;
          color: var(--text-1);
          font-size: 28px;
          font-weight: 600;
          letter-spacing: 0.2px;
        }

        .caption {
          display: inline-flex;
          align-items: center;
          margin-top: 28px;
          padding: 12px 28px;
          border-radius: 999px;
          border: 1px solid rgba(109, 245, 229, 0.18);
          background: rgba(8, 18, 36, 0.78);
          color: rgba(223, 241, 252, 0.84);
          font-size: 14px;
          font-weight: 700;
          letter-spacing: 2.8px;
          text-transform: uppercase;
        }

        .planet-scene {
          right: 34px;
          top: 50%;
          width: 670px;
          height: 452px;
          transform: translateY(-50%);
          perspective: 1400px;
          z-index: 4;
        }

        .planet-aura {
          position: absolute;
          right: 132px;
          top: 46px;
          width: 386px;
          height: 386px;
          border-radius: 50%;
          background:
            radial-gradient(circle, rgba(111, 248, 236, 0.28) 0%, rgba(60, 207, 243, 0.16) 42%, rgba(44, 182, 246, 0.04) 70%, transparent 76%);
          filter: blur(18px);
          animation: auraPulse 10s ease-in-out infinite;
        }

        .earth {
          position: absolute;
          right: 164px;
          top: 74px;
          width: 308px;
          height: 308px;
          border-radius: 50%;
          overflow: hidden;
          transform: rotate(-12deg) translateZ(0);
          transform-style: preserve-3d;
          background:
            radial-gradient(circle at 34% 28%, rgba(255,255,255,0.52) 0%, rgba(255,255,255,0.18) 14%, rgba(255,255,255,0.04) 24%, transparent 36%),
            radial-gradient(circle at 60% 62%, rgba(33, 214, 245, 0.3), transparent 40%),
            radial-gradient(circle at 50% 46%, #61ebf3 0%, #24b2d8 34%, #0d5384 66%, #041126 100%);
          box-shadow:
            0 0 42px rgba(85, 228, 245, 0.32),
            inset -44px -52px 84px rgba(0, 0, 0, 0.66),
            inset 18px 22px 28px rgba(255, 255, 255, 0.14);
          animation: earthFloat 8.2s ease-in-out infinite;
        }

        .earth-surface,
        .earth-clouds,
        .earth-shadow,
        .earth-shine,
        .earth-atmosphere {
          position: absolute;
          inset: 0;
          border-radius: 50%;
        }

        .earth-surface {
          inset: -8%;
          background-image:
            var(--map),
            linear-gradient(90deg, rgba(255,255,255,0.08) 0 8%, rgba(255,255,255,0) 18% 82%, rgba(255,255,255,0.08) 92%),
            linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0) 34%, rgba(0,18,39,0.26) 100%);
          background-repeat: repeat-x, no-repeat, no-repeat;
          background-size: 690px 100%, 100% 100%, 100% 100%;
          background-position: 0 50%, 0 0, 0 0;
          mix-blend-mode: screen;
          opacity: 0.76;
          filter: saturate(1.08) contrast(1.06);
          animation: earthSpin 18s linear infinite;
        }

        .earth-clouds {
          inset: -10%;
          background-image: var(--clouds);
          background-repeat: repeat-x;
          background-size: 760px 100%;
          background-position: 0 50%;
          opacity: 0.3;
          mix-blend-mode: screen;
          animation: cloudSpin 34s linear infinite;
        }

        .earth-shadow {
          background:
            radial-gradient(circle at 74% 60%, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.28) 32%, transparent 58%),
            radial-gradient(circle at 84% 24%, rgba(0,0,0,0.36) 0%, transparent 30%);
          mix-blend-mode: multiply;
        }

        .earth-shine {
          background:
            radial-gradient(circle at 30% 20%, rgba(255,255,255,0.4), transparent 22%),
            radial-gradient(circle at 44% 30%, rgba(255,255,255,0.15), transparent 28%),
            linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0) 36%);
        }

        .earth-atmosphere {
          inset: -2px;
          border: 1px solid rgba(219, 255, 252, 0.34);
          box-shadow: 0 0 16px rgba(126, 247, 238, 0.18);
        }

        .ring {
          inset: 0;
          animation: ringFloat 10s ease-in-out infinite;
          pointer-events: none;
        }

        .ring::before,
        .ring::after {
          content: "";
          position: absolute;
          left: 50%;
          top: 50%;
          width: 520px;
          height: 118px;
          border-radius: 50%;
          transform: translate(-50%, -50%) rotate(-12deg);
        }

        .ring::before {
          border: 8px solid rgba(235, 246, 255, 0.54);
          border-left-color: rgba(126, 247, 238, 0.28);
          border-right-color: rgba(255, 180, 122, 0.3);
          box-shadow: 0 0 20px rgba(181, 248, 255, 0.16);
        }

        .ring::after {
          border: 4px dashed rgba(255, 255, 255, 0.86);
          border-left-color: rgba(138, 250, 243, 0.86);
          border-right-color: rgba(255, 208, 164, 0.84);
          opacity: 0.9;
          animation: dashFlow 18s linear infinite;
        }

        .ring.back {
          z-index: 1;
          opacity: 0.72;
        }

        .ring.front {
          z-index: 5;
          clip-path: inset(50% 0 0 0);
        }

        .ring.front::before {
          opacity: 0.98;
        }

        .ring.front::after {
          opacity: 0.74;
        }

        .moon {
          position: absolute;
          border-radius: 50%;
          animation: moonFloat 11s ease-in-out infinite;
        }

        .moon.main {
          right: 78px;
          top: 234px;
          width: 60px;
          height: 60px;
          background:
            radial-gradient(circle at 54% 48%, #ffd9b7 0 22%, #f4b275 23%, #8c4a27 100%);
          box-shadow:
            0 0 28px rgba(245, 156, 99, 0.24),
            0 0 0 1px rgba(255, 202, 161, 0.4) inset;
        }

        .moon.glint {
          right: 546px;
          top: 110px;
          width: 40px;
          height: 40px;
          background:
            radial-gradient(circle, rgba(157,255,244,1) 0 28%, rgba(43, 148, 214, 0.8) 45%, rgba(43, 148, 214, 0) 62%);
          box-shadow: 0 0 34px rgba(117, 255, 244, 0.22);
          animation-duration: 8s;
        }

        @keyframes starsDriftOne {
          from { transform: translate3d(0, 0, 0); }
          to { transform: translate3d(-28px, -16px, 0); }
        }

        @keyframes starsDriftTwo {
          from { transform: scale(1.05) translate3d(0, 0, 0); }
          to { transform: scale(1.08) translate3d(26px, -22px, 0); }
        }

        @keyframes dustPulse {
          0%, 100% { transform: scale(1); opacity: 0.42; }
          50% { transform: scale(1.08); opacity: 0.6; }
        }

        @keyframes orbitSweep {
          0%, 100% { transform: translateX(0) rotate(var(--trail-rot, 0deg)); }
          50% { transform: translateX(22px) rotate(calc(var(--trail-rot, 0deg) + 1deg)); }
        }

        @keyframes earthSpin {
          from { background-position: 0 50%, 0 0, 0 0; }
          to { background-position: -690px 50%, 0 0, 0 0; }
        }

        @keyframes cloudSpin {
          from { background-position: 0 50%; }
          to { background-position: -760px 50%; }
        }

        @keyframes earthFloat {
          0%, 100% { transform: translate3d(0, 0, 0) rotate(-12deg); }
          50% { transform: translate3d(0, -10px, 0) rotate(-9deg); }
        }

        @keyframes auraPulse {
          0%, 100% { transform: scale(1); opacity: 0.82; }
          50% { transform: scale(1.06); opacity: 1; }
        }

        @keyframes ringFloat {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-6px); }
        }

        @keyframes dashFlow {
          from { transform: translate(-50%, -50%) rotate(-12deg) rotate(0deg); }
          to { transform: translate(-50%, -50%) rotate(-12deg) rotate(360deg); }
        }

        @keyframes moonFloat {
          0%, 100% { transform: translate3d(0, 0, 0); }
          50% { transform: translate3d(0, -8px, 0); }
        }

        .trail.one { --trail-rot: 1deg; }
        .trail.two { --trail-rot: -4deg; }
        .trail.three { --trail-rot: -8deg; }
      </style>

      <div class="scene">
        <div class="space"></div>
        <div class="stars one"></div>
        <div class="stars two"></div>
        <div class="dust one"></div>
        <div class="dust two"></div>
        <div class="trail one"></div>
        <div class="trail two"></div>
        <div class="trail three"></div>

        <div class="hero">
          <div class="eyebrow">
            <span class="dots">
              <span class="a"></span>
              <span class="b"></span>
              <span class="c"></span>
            </span>
            <span>Orbital Profile</span>
          </div>
          <h1>NGUYEN<br/>THE NAM</h1>
          <div class="subtitle">Full-stack builder / UI-UX learner / Dark</div>
          <div class="caption">Software Engineering</div>
        </div>

        <div class="planet-scene">
          <div class="planet-aura"></div>
          <div class="ring back"></div>
          <div class="earth">
            <div class="earth-surface"></div>
            <div class="earth-clouds"></div>
            <div class="earth-shadow"></div>
            <div class="earth-shine"></div>
            <div class="earth-atmosphere"></div>
          </div>
          <div class="ring front"></div>
          <div class="moon main"></div>
          <div class="moon glint"></div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
